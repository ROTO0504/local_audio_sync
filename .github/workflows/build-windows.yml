name: Build Windows

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Remove opus_flutter_windows from CMake plugin list
        shell: pwsh
        run: |
          $f = "windows\flutter\generated_plugins.cmake"
          (Get-Content $f) | Where-Object { $_ -notmatch 'opus_flutter_windows' } | Set-Content $f
          Write-Host "Patched $f"

      # 1 回目: cmake configure + ALL_BUILD + INSTALL を走らせる。
      # クリーン環境では INSTALL タスクの post-build イベントが exit 1 で
      # 落ちることがあるが、その時点で大半の DLL ビルドは完了している。
      - name: Build (1st pass — INSTALL stage may fail)
        shell: pwsh
        continue-on-error: true
        run: flutter build windows --release

      # 2 回目: 1 回目で残ったプラグイン DLL をビルドし切り、INSTALL も完走させる。
      # キャッシュが効くので失敗するべき要因は無い。ここで失敗したら本物のエラー。
      - name: Build (2nd pass — must succeed)
        shell: pwsh
        run: flutter build windows --release

      # 念押しで cmake --build --target install を呼び、
      # 万一抜け落ちている依存物があれば確実にコピーする。
      # `--install` ではなく `--build --target install` にすることで、
      # 必要なら ALL_BUILD も自動で走る。
      - name: Run CMake build+install (final safety net)
        shell: pwsh
        run: |
          $cmake = (Get-ChildItem `
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe", `
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe", `
            "C:\Program Files\Microsoft Visual Studio\2025\Enterprise\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe", `
            "C:\Program Files\CMake\bin\cmake.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $cmake) {
            $cmake = (Get-Command cmake -ErrorAction SilentlyContinue).Source
          }
          if (-not $cmake) { $cmake = "cmake" }
          Write-Host "Using cmake at: $cmake"
          & $cmake --build build/windows/x64 --config Release --target install

      - name: Verify bundle contents
        shell: pwsh
        run: |
          $bundle = "build/windows/Release"
          Write-Host "=== Bundle directory listing ==="
          if (Test-Path $bundle) {
            Get-ChildItem $bundle -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            Write-Host "(bundle directory does not exist)"
          }

          $missing = @()
          if (-not (Test-Path "$bundle/local_audio_sync.exe")) { $missing += "local_audio_sync.exe" }
          if (-not (Test-Path "$bundle/flutter_windows.dll"))   { $missing += "flutter_windows.dll" }
          if (-not (Test-Path "$bundle/audio_mixer_plugin.dll")) { $missing += "audio_mixer_plugin.dll" }
          if (-not (Test-Path "$bundle/data"))                   { $missing += "data/" }

          if ($missing.Count -gt 0) {
            throw "バンドルに不足: $($missing -join ', ')"
          }
          Write-Host "All required files present."

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-bundle
          # Flutter Windows の正しいバンドル位置。
          # `build/windows/x64/runner/Release/` は単に EXE を生成する中間
          # ディレクトリで、配布用の依存 DLL や data/ は含まれない。
          path: build/windows/Release/
