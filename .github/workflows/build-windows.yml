name: Build Windows

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Remove opus_flutter_windows from CMake plugin list
        shell: pwsh
        run: |
          $f = "windows\flutter\generated_plugins.cmake"
          (Get-Content $f) | Where-Object { $_ -notmatch 'opus_flutter_windows' } | Set-Content $f
          Write-Host "Patched $f"

      # 初回 cmake 構成時の post-build INSTALL イベントが稀に exit 1 で
      # 失敗することがあるため、失敗しても続行し、後段で明示的に
      # cmake --install を走らせる二段構えにする。
      - name: Build Windows executable (release)
        shell: pwsh
        continue-on-error: true
        run: flutter build windows --release

      # 1 回目の `flutter build windows --release` で INSTALL が落ちた場合の
      # フォールバック。cmake --install を直接呼ぶことで、すでにビルド済みの
      # オブジェクトを使ってバンドルディレクトリを完成させる。
      - name: Run CMake install (fallback to ensure full bundle)
        shell: pwsh
        run: |
          $cmake = (Get-ChildItem `
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe", `
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe", `
            "C:\Program Files\CMake\bin\cmake.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $cmake) { $cmake = "cmake" }
          Write-Host "Using cmake at: $cmake"
          & $cmake --install build/windows/x64 --config Release

      - name: Verify bundle contents
        shell: pwsh
        run: |
          $bundle = "build/windows/Release"
          if (-not (Test-Path "$bundle/local_audio_sync.exe")) {
            throw "local_audio_sync.exe が見つかりません"
          }
          if (-not (Test-Path "$bundle/flutter_windows.dll")) {
            throw "flutter_windows.dll が見つかりません"
          }
          if (-not (Test-Path "$bundle/audio_mixer_plugin.dll")) {
            throw "audio_mixer_plugin.dll が見つかりません"
          }
          if (-not (Test-Path "$bundle/data")) {
            throw "data ディレクトリが見つかりません"
          }
          Write-Host "Bundle contents:"
          Get-ChildItem $bundle -Recurse | Select-Object FullName | Format-Table -AutoSize

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-bundle
          # Flutter Windows の正しいバンドル位置。
          # `build/windows/x64/runner/Release/` は単に EXE を生成する中間
          # ディレクトリで、配布用の依存 DLL や data/ は含まれない。
          path: build/windows/Release/
