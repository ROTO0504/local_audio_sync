name: Build Windows

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Remove opus_flutter_windows from CMake plugin list
        shell: pwsh
        run: |
          $f = "windows\flutter\generated_plugins.cmake"
          (Get-Content $f) | Where-Object { $_ -notmatch 'opus_flutter_windows' } | Set-Content $f
          Write-Host "Patched $f"

      - name: Build Windows executable (release)
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/
