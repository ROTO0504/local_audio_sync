name: Build Windows

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Create opus_flutter_windows native stub
        shell: pwsh
        run: |
          $pubCache = (dart pub cache path).Trim()
          $opusDir = Get-ChildItem "$pubCache\hosted\pub.dev" -Filter "opus_flutter_windows-*" |
                     Sort-Object Name -Descending | Select-Object -First 1
          if ($opusDir) {
            $stub = "$($opusDir.FullName)\windows"
            $inc  = "$stub\include\opus_flutter_windows"
            New-Item -ItemType Directory -Force -Path $inc | Out-Null
            Set-Content "$stub\CMakeLists.txt" @'
          cmake_minimum_required(VERSION 3.14)
          project(opus_flutter_windows_windows LANGUAGES CXX)
          set(PLUGIN_NAME "opus_flutter_windows_plugin")
          file(WRITE "${CMAKE_CURRENT_BINARY_DIR}/_stub.cc"
            "extern \"C\" void noneRegisterWithRegistrar(void*) {}\n")
          add_library(${PLUGIN_NAME} STATIC "${CMAKE_CURRENT_BINARY_DIR}/_stub.cc")
          target_include_directories(${PLUGIN_NAME} PUBLIC "${CMAKE_CURRENT_SOURCE_DIR}/include")
          set_property(TARGET ${PLUGIN_NAME} PROPERTY CXX_STANDARD 17)
          '@
            Set-Content "$inc\none.h" 'extern "C" void noneRegisterWithRegistrar(void* registrar);'
            Write-Host "Stub created at $stub"
          } else {
            Write-Host "opus_flutter_windows not found in pub cache, skipping"
          }

      - name: Build Windows executable (release)
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/
