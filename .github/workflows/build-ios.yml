name: Build iOS / iPadOS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  # 任意のブランチをオンデマンドで署名なしビルド確認するための手動トリガー。
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 注意:
# このワークフローは Runner ターゲットの "コンパイル確認" のみを行います。
# Broadcast Upload Extension(ios/BroadcastExtension/)は Xcode 上で
# 別ターゲットとして手動追加する前提のため、CI のデフォルトビルドには
# 含まれません(pbxproj に登録されていないため)。
# 詳細は docs/ios/README.md を参照してください。
# 実機テストは AltStore / Sideloadly / Mac + USB のいずれかで行ってください。
jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ios-build
          path: build/ios/iphoneos/
