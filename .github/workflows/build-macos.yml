name: Build macOS

# 課金枠を抑えるため、macOS runner(1分=10分カウント)は手動トリガのみ。
# リリース前など必要なタイミングで GitHub UI の "Run workflow" から実行する。
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    # ScreenCaptureKit は macOS 13 以降。GitHub Actions の macOS-13 以降 runner を使う。
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/local_audio_sync.app
