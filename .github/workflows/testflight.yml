name: TestFlight

# iOS / macOS を署名付きでビルドし、App Store Connect(TestFlight)へ
# アップロードする。証明書・Provisioning Profile は Xcode の cloud signing
# (-allowProvisioningUpdates + App Store Connect API キー)に任せるため、
# GitHub Secrets は以下の 4 つだけでよい:
#
#   ASC_KEY_ID      App Store Connect API キーの Key ID
#   ASC_ISSUER_ID   同 Issuer ID
#   ASC_KEY_P8      AuthKey_XXXX.p8 の中身(テキストそのまま)
#   APPLE_TEAM_ID   Apple Developer の Team ID(10 桁英数)
#
# 事前準備の詳細は docs/TESTFLIGHT_SETUP.md を参照。

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '配信対象'
        type: choice
        options:
          - both
          - ios
          - macos
        default: both

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'ios' }}
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Place App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Flutter build config
        # ビルド番号は Run 番号で単調増加させる(TestFlight は重複ビルド番号を拒否する)。
        # --no-codesign で Flutter の証明書チェックを回避する(実署名は後段の
        # xcodebuild archive が cloud signing で行うため、ここでは不要)。
        run: flutter build ios --release --config-only --no-codesign --build-number=${{ github.run_number }}

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Archive (cloud signing)
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

  macos:
    if: ${{ inputs.platform == 'both' || inputs.platform == 'macos' }}
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Place App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Flutter build config
        run: flutter build macos --release --config-only --build-number=${{ github.run_number }}

      - name: Install CocoaPods
        working-directory: macos
        run: pod install

      - name: Archive (cloud signing)
        run: |
          xcodebuild -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/macos/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/macos/Runner.xcarchive \
            -exportOptionsPlist macos/ExportOptions.plist \
            -exportPath build/macos/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"
